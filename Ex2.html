<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nombreSecret = Math.floor(Math.random() * 10) + 1;
let tentative = 0;
let proposition;
do {
    proposition = parseInt(prompt("Devinez un nombre entre 1 et 10 :"));
    tentative++;
    if (proposition < nombreSecret) {
        alert("Le nombre est plus grand !");
    } else if (proposition > nombreSecret) {
        alert("Le nombre est plus petit !");
    }
} while (proposition !== nombreSecret);
alert("Bravo ! Vous avez trouvé en " + tentative + " tentatives.");
console.log("Nombre trouvé en", tentative, "tentatives")
    </script>
</body>
</html>
